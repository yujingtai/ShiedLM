<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldLM 安全聊天演示</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="layout">
    <section class="hero">
        <p class="eyebrow">ShieldLM</p>
        <h1>大模型提示注入防护演示台</h1>
        <p class="intro">
            这里直接串起输入检测、风险评分、策略执行、输出防护和审计留痕，
            用一个企业客服场景演示提示注入攻击是如何被识别和处置的。
        </p>
    </section>

    <section class="panel">
        <div class="panel-header">
            <h2>安全聊天</h2>
            <p>输入一个问题，页面会展示本轮请求的风险等级、防御动作和最终安全回复。</p>
        </div>

        <form class="chat-form" th:action="@{/chat}" th:object="${chatForm}" method="post">
            <label for="prompt">用户输入</label>
            <textarea id="prompt" th:field="*{prompt}" rows="7"
                      placeholder="例如：请介绍退款流程，或者尝试一条混合型提示注入攻击样例。"></textarea>
            <button type="submit">发送并检测</button>
        </form>

        <section class="result-panel" th:if="${submitted}">
            <div class="result-header">
                <h3>本轮防护结果</h3>
                <span class="risk-badge"
                      th:text="${response.decision.riskLevel}"
                      th:classappend="${' risk-' + #strings.toLowerCase(response.decision.riskLevel.name())}">
                    LOW
                </span>
            </div>

            <div class="metric-grid">
                <article class="metric-card">
                    <span class="metric-label">防御动作</span>
                    <strong th:text="${response.decision.action}">ALLOW</strong>
                </article>
                <article class="metric-card">
                    <span class="metric-label">风险分数</span>
                    <strong th:text="${response.decision.totalScore}">0</strong>
                </article>
                <article class="metric-card">
                    <span class="metric-label">输出拦截</span>
                    <strong th:text="${response.outputBlocked ? '是' : '否'}">否</strong>
                </article>
            </div>

            <div class="result-block">
                <h4>命中规则</h4>
                <div class="tag-list" th:if="${!#lists.isEmpty(response.decision.hits)}">
                    <span class="tag" th:each="hit : ${response.decision.hits}" th:text="${hit.ruleKey}">RULE</span>
                </div>
                <p class="empty-hint" th:if="${#lists.isEmpty(response.decision.hits)}">未命中风险规则。</p>
            </div>

            <div class="result-block">
                <h4>模型原始回复</h4>
                <pre th:text="${response.rawReply}">raw reply</pre>
            </div>

            <div class="result-block">
                <h4>最终安全回复</h4>
                <pre th:text="${response.finalReply}">safe reply</pre>
            </div>
        </section>
    </section>
</main>

<script th:src="@{/js/chat.js}"></script>
</body>
</html>

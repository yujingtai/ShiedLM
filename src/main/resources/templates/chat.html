<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldLM 安全聊天演示</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="layout">
    <section class="hero">
        <p class="eyebrow">ShieldLM</p>
        <h1>大模型提示注入防护演示台</h1>
        <p class="intro">
            当前页面先提供聊天演示入口。后续会在这里串接输入检测、风险评分、策略执行、
            输出审查和审计日志，让整个防护过程可视化。
        </p>
    </section>

    <section class="panel">
        <div class="panel-header">
            <h2>安全聊天</h2>
            <p>输入一个问题，后续这里会展示系统如何判定风险并生成安全回复。</p>
        </div>

        <form class="chat-form" th:object="${chatForm}">
            <label for="prompt">用户输入</label>
            <textarea id="prompt" th:field="*{prompt}" rows="7"
                      placeholder="例如：请介绍退款流程，或者尝试一个攻击样例。"></textarea>
            <button type="button">发送</button>
        </form>
    </section>
</main>

<script th:src="@{/js/chat.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldLM 审计日志</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="layout">
    <section class="topbar">
        <div>
            <p class="eyebrow">ShieldLM Audit</p>
            <h1>审计日志</h1>
        </div>
        <nav class="page-links">
            <a th:href="@{/}">聊天演示</a>
            <a class="is-active" th:href="@{/audit}">审计日志</a>
            <a th:href="@{/rules}">规则与统计</a>
        </nav>
    </section>

    <section class="panel">
        <div class="panel-header">
            <h2>最近请求记录</h2>
            <p>这里展示每次输入触发的风险等级、防御动作和最终输出，用于回溯防护链路。</p>
        </div>

        <form class="filter-form" th:action="@{/audit}" method="get">
            <div class="filter-field filter-field-wide">
                <label for="keyword">关键词检索</label>
                <input id="keyword"
                       name="keyword"
                       type="text"
                       th:value="${keyword}"
                       placeholder="搜索提示词、攻击类型或最终回复">
            </div>
            <div class="filter-field">
                <label for="riskLevel">风险等级</label>
                <select id="riskLevel" name="riskLevel">
                    <option value="">全部</option>
                    <option th:each="risk : ${riskLevels}"
                            th:value="${risk.name()}"
                            th:text="${risk.name()}"
                            th:selected="${selectedRiskLevel == risk}">
                        HIGH
                    </option>
                </select>
            </div>
            <div class="filter-field">
                <label for="defenseAction">防御动作</label>
                <select id="defenseAction" name="defenseAction">
                    <option value="">全部</option>
                    <option th:each="action : ${defenseActions}"
                            th:value="${action.name()}"
                            th:text="${action.name()}"
                            th:selected="${selectedDefenseAction == action}">
                        BLOCK
                    </option>
                </select>
            </div>
            <div class="filter-actions">
                <button type="submit">应用筛选</button>
                <a th:href="@{/audit}">重置</a>
            </div>
        </form>

        <section class="result-panel audit-summary-panel">
            <div class="result-header">
                <h3>筛选结果</h3>
                <span class="summary-note"
                      th:text="${totalPages == 0 ? '当前没有匹配记录' : '共匹配 ' + totalMatches + ' 条，当前第 ' + pageNumberDisplay + ' / ' + totalPages + ' 页'}">
                    共匹配 0 条，当前第 0 / 0 页
                </span>
            </div>

            <div class="metric-grid">
                <article class="metric-card">
                    <span class="metric-label">匹配记录数</span>
                    <strong th:text="${displayedCount}">0</strong>
                </article>
                <article class="metric-card">
                    <span class="metric-label">当前页输入拦截数</span>
                    <strong th:text="${blockedCount}">0</strong>
                </article>
                <article class="metric-card">
                    <span class="metric-label">当前页输出拦截数</span>
                    <strong th:text="${outputBlockedCount}">0</strong>
                </article>
            </div>
        </section>

        <div class="table-shell" th:if="${!#lists.isEmpty(records)}">
            <table class="audit-table">
                <thead>
                <tr>
                    <th>时间</th>
                    <th>用户输入</th>
                    <th>攻击类型</th>
                    <th>风险等级</th>
                    <th>防御动作</th>
                    <th>最终回复</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="record : ${records}">
                    <td th:text="${#temporals.format(record.createdAt, 'MM-dd HH:mm:ss')}">04-06 20:30:00</td>
                    <td th:text="${record.userPrompt}">prompt</td>
                    <td th:text="${record.attackTypes}">PROMPT_EXTRACTION</td>
                    <td>
                        <span class="risk-badge"
                              th:text="${record.riskLevel}"
                              th:classappend="${' risk-' + #strings.toLowerCase(record.riskLevel.name())}">
                            HIGH
                        </span>
                    </td>
                    <td th:text="${record.defenseAction}">BLOCK</td>
                    <td th:text="${record.finalReply}">request blocked</td>
                </tr>
                </tbody>
            </table>
        </div>

        <nav class="pagination-bar" th:if="${totalPages > 1}">
            <a th:if="${hasPrevious}"
               th:href="@{/audit(page=${pageNumber - 1}, keyword=${keyword}, riskLevel=${selectedRiskLevel}, defenseAction=${selectedDefenseAction})}">
                上一页
            </a>
            <span th:if="${!hasPrevious}" class="pagination-link is-disabled">上一页</span>
            <span class="pagination-status" th:text="${'第 ' + pageNumberDisplay + ' / ' + totalPages + ' 页'}">
                第 1 / 1 页
            </span>
            <a th:if="${hasNext}"
               th:href="@{/audit(page=${pageNumber + 1}, keyword=${keyword}, riskLevel=${selectedRiskLevel}, defenseAction=${selectedDefenseAction})}">
                下一页
            </a>
            <span th:if="${!hasNext}" class="pagination-link is-disabled">下一页</span>
        </nav>

        <p class="empty-hint" th:if="${#lists.isEmpty(records)}">当前筛选条件下暂无审计记录。</p>
    </section>
</main>
</body>
</html>
